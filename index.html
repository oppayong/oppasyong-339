<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鎔安組 | 戰情管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .glass-modal { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="text-gray-800 pb-24 select-none">

  <div id="app" class="max-w-md mx-auto min-h-screen relative overflow-hidden">
    
    <div v-show="currentTab === '339'" class="p-5">
      <header class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-6 mb-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-blue-500 to-indigo-500"></div>
        <div class="flex justify-between items-start">
          <div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">鎔安組</h1>
            <p class="text-[11px] font-bold text-gray-400 mt-1 uppercase tracking-widest">今日 339 覆盤</p>
          </div>
          <div class="flex gap-4 text-right">
            <div>
              <p class="text-[10px] text-gray-400 font-bold mb-1">銷售分</p>
              <p class="text-3xl font-black text-blue-600 leading-none">{{ totalSalesScore }}</p>
            </div>
            <div>
              <p class="text-[10px] text-gray-400 font-bold mb-1">增員分</p>
              <p class="text-3xl font-black text-emerald-500 leading-none">{{ totalRecruitScore }}</p>
            </div>
          </div>
        </div>
        <div class="mt-5 pt-4 border-t border-gray-50">
          <p class="text-xs text-gray-500 leading-relaxed font-medium">
            <span class="text-amber-500 font-bold mr-1">💡 系統洞察：</span>{{ aiSuggestion }}
          </p>
        </div>
      </header>

      <div class="space-y-3 relative">
        <div class="absolute left-[3.25rem] top-4 bottom-4 w-[2px] bg-gray-100 -z-10 rounded-full"></div>
        <div v-for="time in timeSlots" :key="time" @click="openModal(time)" class="flex bg-white rounded-2xl shadow-sm border border-gray-50 active:scale-[0.98] transition-transform cursor-pointer overflow-hidden">
          <div class="w-20 flex justify-center py-4">
            <span class="text-[13px] font-bold text-gray-400">{{ time }}</span>
          </div>
          <div class="flex-1 p-4 border-l border-gray-50 flex flex-col justify-center min-h-[4.5rem]">
            <template v-if="getActivity(time)">
              <div>
                <span class="inline-block px-2 py-1 text-[10px] font-black rounded-md mb-1.5" :class="getTypeStyle(getActivity(time).activity_type)">
                  {{ getActivity(time).activity_type }}
                </span>
                <p class="text-sm font-bold text-gray-800">{{ getActivity(time).client_name }}</p>
                <p v-if="getActivity(time).notes" class="text-xs text-gray-400 mt-1 truncate">{{ getActivity(time).notes }}</p>
              </div>
            </template>
            <template v-else>
              <span class="text-xs text-gray-300 font-bold tracking-wider">+ 新增行程</span>
            </template>
          </div>
        </div>
      </div>
    </div>

    <div v-show="currentTab === 'org'" class="p-5 text-center pt-20 text-gray-400 font-bold">
      組織圖架構已就緒，可後續擴充資料庫連線。
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-gray-100/50 pb-safe pt-2 px-6 z-40">
      <div class="max-w-md mx-auto flex justify-around items-center h-16">
        <div @click="currentTab = '339'" class="flex flex-col items-center justify-center w-20 h-full cursor-pointer transition-all" :class="currentTab === '339' ? 'text-blue-600' : 'text-gray-400'">
          <span class="text-[11px] font-bold">339 戰情</span>
        </div>
        <div @click="currentTab = 'org'" class="flex flex-col items-center justify-center w-20 h-full cursor-pointer transition-all" :class="currentTab === 'org' ? 'text-blue-600' : 'text-gray-400'">
          <span class="text-[11px] font-bold">組織發展</span>
        </div>
      </div>
    </nav>

    <div v-show="isModalOpen" class="fixed inset-0 z-50 flex items-end justify-center">
      <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm" @click="isModalOpen = false"></div>
      <div class="relative w-full max-w-md glass-modal rounded-t-[2rem] p-6 shadow-2xl animate-slide-up pb-10">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
        <h2 class="text-xl font-black text-gray-800 mb-1">記錄活動</h2>
        <p class="text-xs font-bold text-blue-600 mb-6">時段：{{ selectedTime }}</p>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-2">對象 (客戶或準增員)</label>
            <input v-model="formData.clientName" type="text" placeholder="輸入姓名..." class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-2">活動類型</label>
            <div class="flex flex-wrap gap-2">
              <button v-for="type in activityTypes" :key="type" @click="formData.type = type" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all" :class="formData.type === type ? 'bg-gray-800 text-white shadow-md' : 'bg-white border border-gray-200 text-gray-600'">{{ type }}</button>
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-2">備註事項</label>
            <textarea v-model="formData.notes" rows="2" placeholder="重點記錄..." class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
          <button @click="saveActivity" :disabled="isSaving" class="w-full mt-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 active:scale-95 transition-transform disabled:opacity-50">
            {{ isSaving ? '儲存中...' : '儲存同步至雲端' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue;

    // ==========================================
    // ⚠️ 1. 請在這裡貼上你 Supabase 的兩把鑰匙！
    // ==========================================
    const SUPABASE_URL = 'https://mezculqrqxwlmfxgrcru.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lemN1bHFycXh3bG1meGdyY3J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjU0NjUsImV4cCI6MjA5MjI0MTQ2NX0.U8aAJs5wi2_wPNWeNRrucQH7gPH4rEJx9KfTgHljVZI
';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    createApp({
      setup() {
        const currentTab = ref('339');
        const timeSlots = Array.from({ length: 16 }, (_, i) => `${(i + 8).toString().padStart(2, '0')}:00`);
        const activities = ref([]); // 資料庫抓下來的資料放這
        const isSaving = ref(false);

        // 取得今日日期 (格式 YYYY-MM-DD)
        const todayStr = new Date().toISOString().split('T')[0];

        // 2. 從資料庫抓取今日行程
        const fetchActivities = async () => {
          const { data, error } = await supabase
            .from('activities')
            .select('*')
            .eq('activity_date', todayStr);
          if (!error && data) activities.value = data;
        };

        onMounted(() => { fetchActivities(); });

        const totalSalesScore = computed(() => activities.value.reduce((sum, act) => sum + act.sales_score, 0));
        const totalRecruitScore = computed(() => activities.value.reduce((sum, act) => sum + act.recruit_score, 0));
        
        const aiSuggestion = computed(() => {
          if (totalSalesScore.value > totalRecruitScore.value * 2 && totalSalesScore.value > 0) return '銷售動能強勁！建議明日安排 1-2 個增員約訪。';
          if (totalRecruitScore.value > 0) return '增員能量注入中！趁熱打鐵推進準增員的公會測驗進度。';
          return '持續累積活動量，量大是致勝的關鍵！';
        });

        const getActivity = (time) => activities.value.find(a => a.start_time === time);

        const getTypeStyle = (type) => {
          const styles = { '約訪': 'bg-blue-100 text-blue-700', '面談': 'bg-blue-500 text-white', '簽約': 'bg-purple-600 text-white', '客戶服務': 'bg-gray-100 text-gray-600', '增員活動': 'bg-emerald-100 text-emerald-700', '增員約訪': 'bg-emerald-400 text-white', '增員面談': 'bg-emerald-600 text-white', '其他': 'bg-orange-100 text-orange-600' };
          return styles[type] || 'bg-gray-100 text-gray-500';
        };

        const isModalOpen = ref(false);
        const selectedTime = ref('');
        const activityTypes = ['約訪', '面談', '簽約', '客戶服務', '增員活動', '增員約訪', '增員面談', '其他'];
        const formData = reactive({ clientName: '', type: '約訪', notes: '' });

        const openModal = (time) => {
          selectedTime.value = time;
          const existing = getActivity(time);
          if (existing) {
            formData.clientName = existing.client_name; formData.type = existing.activity_type; formData.notes = existing.notes;
          } else {
            formData.clientName = ''; formData.type = '約訪'; formData.notes = '';
          }
          isModalOpen.value = true;
        };

        // 3. 儲存至 Supabase 資料庫
        const saveActivity = async () => {
          if (!formData.clientName) { alert('請填寫對象姓名'); return; }
          isSaving.value = true;
          
          let sScore = 0; let rScore = 0;
          if (formData.type === '約訪') sScore = 1; if (formData.type === '面談') sScore = 2; if (formData.type === '簽約') sScore = 3;
          if (formData.type === '增員活動') rScore = 1; if (formData.type === '增員約訪') rScore = 2; if (formData.type === '增員面談') rScore = 5;

          // 計算結束時間 (預設一小時)
          let hour = parseInt(selectedTime.value.split(':')[0]);
          let endTime = `${(hour + 1).toString().padStart(2, '0')}:00`;

          const payload = {
            activity_date: todayStr,
            start_time: selectedTime.value,
            end_time: endTime,
            activity_type: formData.type,
            client_name: formData.clientName,
            notes: formData.notes,
            sales_score: sScore,
            recruit_score: rScore
          };

          // 先刪除該時段舊資料 (避免重複)
          await supabase.from('activities').delete().eq('activity_date', todayStr).eq('start_time', selectedTime.value);
          // 寫入新資料
          await supabase.from('activities').insert([payload]);

          await fetchActivities(); // 重新抓取資料更新畫面
          isSaving.value = false;
          isModalOpen.value = false;
        };

        return { currentTab, timeSlots, activities, totalSalesScore, totalRecruitScore, aiSuggestion, getActivity, getTypeStyle, isModalOpen, selectedTime, activityTypes, formData, openModal, saveActivity, isSaving };
      }
    }).mount('#app');
  </script>
</body>
</html>
