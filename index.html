<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鎔安組 | 戰情室</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    /* 頂級 iOS 原生 App 質感設定 */
    body { background-color: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .glass-card { background: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.5); }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0;} to { transform: translateY(0); opacity: 1;} }
    .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
  </style>
</head>
<body class="text-gray-800 pb-24 select-none antialiased">

  <div id="app" class="max-w-md mx-auto min-h-screen relative overflow-hidden" v-cloak>
    
    <div v-show="currentTab === '339'" class="p-5 animate-fade-in">
      
      <header class="glass-card rounded-[2rem] p-6 mb-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-600"></div>
        <div class="flex justify-between items-start">
          <div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">鎔安組</h1>
            <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">339 活動量覆盤</p>
          </div>
          <div class="flex gap-4 text-right">
            <div>
              <p class="text-[10px] text-gray-400 font-bold mb-1">銷售分</p>
              <p class="text-3xl font-black text-blue-600 leading-none">{{ totalSalesScore }}</p>
            </div>
            <div>
              <p class="text-[10px] text-gray-400 font-bold mb-1">增員分</p>
              <p class="text-3xl font-black text-emerald-500 leading-none">{{ totalRecruitScore }}</p>
            </div>
          </div>
        </div>
        <div class="mt-5 pt-4 border-t border-gray-100/50">
          <p class="text-[11px] text-gray-500 font-medium leading-relaxed">
            <span class="text-blue-500 font-bold">教練建議：</span>{{ aiSuggestion }}
          </p>
        </div>
      </header>

      <div class="space-y-3 relative">
        <div class="absolute left-[3.25rem] top-4 bottom-4 w-[2px] bg-gray-200/50 -z-10 rounded-full"></div>
        
        <div v-for="time in timeSlots" :key="time" @click="openModal(time)"
             class="flex bg-white rounded-2xl shadow-sm border border-gray-100 active:scale-[0.97] transition-all cursor-pointer overflow-hidden">
          
          <div class="w-20 flex justify-center py-4">
            <span class="text-[13px] font-bold text-gray-400">{{ time }}</span>
          </div>
          
          <div class="flex-1 p-4 border-l border-gray-50 flex flex-col justify-center min-h-[4.5rem]">
            <template v-if="getActivity(time)">
              <div>
                <span class="inline-block px-2 py-0.5 text-[10px] font-black rounded text-white mb-1.5 shadow-sm" :class="getTypeStyle(getActivity(time).type)">
                  {{ getActivity(time).type }}
                </span>
                <p class="text-sm font-bold text-gray-900">{{ getActivity(time).clientName }}</p>
                <p class="text-xs text-gray-400 mt-1 truncate">{{ getActivity(time).notes }}</p>
              </div>
            </template>
            <template v-else>
              <span class="text-xs text-gray-300 font-bold tracking-wider">+ 點擊新增行程</span>
            </template>
          </div>
        </div>
      </div>
    </div>

    <div v-show="currentTab === 'org'" class="p-5 animate-fade-in">
      <header class="mb-8 mt-2">
        <h1 class="text-2xl font-black text-gray-900 tracking-tight">組織發展</h1>
        <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">團隊編制與進度</p>
      </header>

      <div class="flex flex-col items-center">
        <div class="bg-gray-900 text-white w-full max-w-[16rem] p-5 rounded-[1.5rem] shadow-xl text-center relative z-10">
          <p class="text-[10px] text-gray-400 font-bold mb-1">業務主任 (未來區經理)</p>
          <p class="text-xl font-black tracking-widest">鎔安</p>
        </div>
        
        <div class="w-0.5 h-6 bg-gray-300"></div>
        <div class="w-[85%] h-0.5 bg-gray-300 relative">
          <div class="absolute w-0.5 h-4 bg-gray-300 left-0 top-0"></div>
          <div class="absolute w-0.5 h-4 bg-gray-300 right-0 top-0"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 w-full mt-4">
          <div @click="alert('備註：下週二公會考，本週需確認講義進度')" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm relative active:scale-95 transition-transform cursor-pointer">
            <div class="absolute top-0 left-0 w-full h-1 bg-gray-400 rounded-t-2xl"></div>
            <p class="text-[9px] font-bold text-gray-500 mb-1">臨時帳號 / 準備考試中</p>
            <p class="text-sm font-black text-gray-900">林小華</p>
            <div class="mt-3 inline-block bg-gray-100 px-2 py-1 rounded text-[10px] font-bold text-gray-500">公會考: 4/25</div>
          </div>

          <div @click="alert('備註：已順利開通，本週安排陪同拜訪')" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm relative active:scale-95 transition-transform cursor-pointer">
            <div class="absolute top-0 left-0 w-full h-1 bg-blue-500 rounded-t-2xl"></div>
            <p class="text-[9px] font-bold text-blue-500 mb-1">業務代表</p>
            <p class="text-sm font-black text-gray-900">陳先生</p>
            <div class="mt-3 inline-block bg-blue-50 px-2 py-1 rounded text-[10px] font-bold text-blue-600">陪同面談中</div>
          </div>
        </div>
      </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-gray-200/50 pb-safe pt-2 px-6 z-40">
      <div class="max-w-md mx-auto flex justify-around items-center h-16">
        <div @click="currentTab = '339'" class="flex flex-col items-center justify-center w-20 h-full cursor-pointer transition-colors" :class="currentTab === '339' ? 'text-blue-600' : 'text-gray-400'">
          <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          <span class="text-[10px] font-bold">339 戰情</span>
        </div>
        <div @click="currentTab = 'org'" class="flex flex-col items-center justify-center w-20 h-full cursor-pointer transition-colors" :class="currentTab === 'org' ? 'text-blue-600' : 'text-gray-400'">
          <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
          <span class="text-[10px] font-bold">組織發展</span>
        </div>
      </div>
    </nav>

    <div v-if="isModalOpen" class="fixed inset-0 z-50 flex items-end justify-center">
      <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm" @click="isModalOpen = false"></div>
      
      <div class="relative w-full max-w-md bg-white rounded-t-[2rem] p-6 shadow-2xl animate-slide-up pb-10">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <h2 class="text-xl font-black text-gray-900 mb-1">記錄活動</h2>
        <p class="text-xs font-bold text-blue-600 mb-6">時段：{{ selectedTime }}</p>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-2">對象 (客戶姓名或準增員)</label>
            <input v-model="formData.clientName" type="text" placeholder="輸入姓名..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-2">活動類型</label>
            <div class="flex flex-wrap gap-2">
              <button v-for="type in activityTypes" :key="type" @click="formData.type = type" 
                      class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all" 
                      :class="formData.type === type ? 'bg-gray-900 text-white shadow-md' : 'bg-white border border-gray-200 text-gray-600'">
                {{ type }}
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-2">備註事項 (資安保護)</label>
            <textarea v-model="formData.notes" rows="2" placeholder="重點記錄..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"></textarea>
          </div>
          <button @click="saveActivity" class="w-full mt-4 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 active:scale-95 transition-transform">
            儲存行程
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, computed } = Vue;

    createApp({
      setup() {
        const currentTab = ref('339');
        const timeSlots = Array.from({ length: 16 }, (_, i) => `${(i + 8).toString().padStart(2, '0')}:00`);
        
        // 內建測試資料，確保畫面能立刻顯示
        const activities = ref([
          { time: '10:00', type: '面談', clientName: '王董', notes: '醫療險規劃與體檢報告', sales: 2, recruit: 0 },
          { time: '14:00', type: '增員面談', clientName: '陳先生 (104名單)', notes: '第一次接觸，了解過往背景', sales: 0, recruit: 5 }
        ]);

        const totalSalesScore = computed(() => activities.value.reduce((sum, act) => sum + act.sales, 0));
        const totalRecruitScore = computed(() => activities.value.reduce((sum, act) => sum + act.recruit, 0));
        
        const aiSuggestion = computed(() => {
          if (totalSalesScore.value > totalRecruitScore.value * 2) return '銷售動能強勁！建議明日安排增員約訪。';
          if (totalRecruitScore.value > 0) return '增員能量注入中！趁熱打鐵推進準增員進度。';
          return '持續累積活動量，量大是致勝的關鍵！';
        });

        const getActivity = (time) => activities.value.find(a => a.time === time);

        const getTypeStyle = (type) => {
          const styles = {
            '約訪': 'bg-blue-400', '面談': 'bg-blue-600', '簽約': 'bg-purple-600',
            '客戶服務': 'bg-gray-400', '增員活動': 'bg-emerald-400',
            '增員約訪': 'bg-emerald-500', '增員面談': 'bg-emerald-600', '其他': 'bg-orange-400'
          };
          return styles[type] || 'bg-gray-400';
        };

        const isModalOpen = ref(false);
        const selectedTime = ref('');
        const activityTypes = ['約訪', '面談', '簽約', '客戶服務', '增員活動', '增員約訪', '增員面談', '其他'];
        const formData = reactive({ clientName: '', type: '約訪', notes: '' });

        const openModal = (time) => {
          selectedTime.value = time;
          const existing = getActivity(time);
          if (existing) {
            formData.clientName = existing.clientName; formData.type = existing.type; formData.notes = existing.notes;
          } else {
            formData.clientName = ''; formData.type = '約訪'; formData.notes = '';
          }
          isModalOpen.value = true;
        };

        const saveActivity = () => {
          if (!formData.clientName) { alert('請填寫姓名'); return; }
          
          let sScore = 0; let rScore = 0;
          if (formData.type === '約訪') sScore = 1; if (formData.type === '面談') sScore = 2; if (formData.type === '簽約') sScore = 3;
          if (formData.type === '增員活動') rScore = 1; if (formData.type === '增員約訪') rScore = 2; if (formData.type === '增員面談') rScore = 5;

          activities.value = activities.value.filter(a => a.time !== selectedTime.value);
          activities.value.push({ time: selectedTime.value, type: formData.type, clientName: formData.clientName, notes: formData.notes, sales: sScore, recruit: rScore });
          isModalOpen.value = false;
        };

        return { currentTab, timeSlots, activities, totalSalesScore, totalRecruitScore, aiSuggestion, getActivity, getTypeStyle, isModalOpen, selectedTime, activityTypes, formData, openModal, saveActivity };
      }
    }).mount('#app');
  </script>
</body>
</html>
