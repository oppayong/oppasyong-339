<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鎔安組 | 頂級戰情系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <style>
    body { background-color: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    .glass-nav { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .glass-card { background: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.8); }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0;} to { transform: translateY(0); opacity: 1;} }
    .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body class="text-gray-800 pb-24 select-none antialiased">

  <div id="app" class="max-w-md mx-auto min-h-screen relative overflow-hidden" v-cloak>

    <div v-if="!isUnlocked" class="fixed inset-0 z-[100] bg-gray-900 flex flex-col justify-center items-center p-6 animate-fade-in">
      <div class="w-full max-w-sm bg-white/10 backdrop-blur-2xl rounded-[2rem] p-8 border border-white/20 shadow-2xl text-center">
        <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-400/30">
          <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h1 class="text-2xl font-black text-white tracking-widest mb-1">鎔安組戰情室</h1>
        <p class="text-xs text-blue-200/70 mb-8">AES-256 軍規加密防護</p>
        
        <input v-model="passcode" type="password" placeholder="請輸入專屬密碼解鎖" 
               class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3.5 text-center text-white tracking-widest focus:outline-none focus:border-blue-400/50 transition-colors mb-4">
        
        <button @click="unlockApp" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg transition-colors">
          解鎖系統
        </button>
        <p v-if="loginError" class="text-red-400 text-xs mt-3 font-bold">{{ loginError }}</p>
        <p class="text-[10px] text-gray-500 mt-6 leading-relaxed">初次使用請直接輸入新密碼，系統將以此密碼綁定加密您的所有客戶資料。若遺失密碼將無法恢復資料。</p>
      </div>
    </div>

    <template v-else>
      
      <div v-show="currentTab === '339'" class="p-5 animate-fade-in">
        
        <div class="flex justify-between items-center mb-4 px-2">
          <button @click="changeDate(-1)" class="p-2 text-gray-400 hover:text-blue-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
          </button>
          <div class="text-center relative">
            <input type="date" v-model="currentDate" class="absolute inset-0 opacity-0 w-full h-full cursor-pointer z-10">
            <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-0.5">檢視日期 ▾</p>
            <p class="text-lg font-black text-gray-800">{{ formattedDate }}</p>
          </div>
          <button @click="changeDate(1)" class="p-2 text-gray-400 hover:text-blue-600 transition-colors" :class="{ 'opacity-30 pointer-events-none': isToday }">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>

        <header class="glass-card rounded-[2rem] p-6 mb-6 relative overflow-hidden">
          <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-600"></div>
          <div class="flex justify-between items-start mb-4">
            <div>
              <h1 class="text-2xl font-black text-gray-900 tracking-tight">鎔安組</h1>
              <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">339 活動量</p>
            </div>
            <div class="flex gap-4 text-right">
              <div>
                <p class="text-[10px] text-gray-400 font-bold mb-1">銷售分</p>
                <p class="text-3xl font-black text-blue-600 leading-none">{{ totalSalesScore }}</p>
              </div>
              <div>
                <p class="text-[10px] text-gray-400 font-bold mb-1">增員分</p>
                <p class="text-3xl font-black text-emerald-500 leading-none">{{ totalRecruitScore }}</p>
              </div>
            </div>
          </div>
          <div class="pt-3 border-t border-gray-100">
            <p class="text-[11px] text-gray-500 font-medium leading-relaxed">
              <span class="text-blue-500 font-bold">教練建議：</span>{{ aiSuggestion }}
            </p>
          </div>
        </header>

        <div class="space-y-3 relative pb-8">
          <div class="absolute left-[3.25rem] top-4 bottom-4 w-[2px] bg-gray-200/50 -z-10 rounded-full"></div>
          
          <div v-for="time in timeSlots" :key="time" @click="openActivityModal(time)"
               class="flex bg-white rounded-2xl shadow-sm border border-gray-100 active:scale-[0.98] transition-all cursor-pointer overflow-hidden">
            <div class="w-20 flex justify-center py-4">
              <span class="text-[13px] font-bold text-gray-400">{{ time }}</span>
            </div>
            <div class="flex-1 p-4 border-l border-gray-50 flex flex-col justify-center min-h-[4.5rem]">
              <template v-if="getActivity(time)">
                <div>
                  <span class="inline-block px-2 py-0.5 text-[10px] font-black rounded text-white mb-1.5 shadow-sm" :class="getTypeStyle(getActivity(time).type)">
                    {{ getActivity(time).type }}
                  </span>
                  <p class="text-sm font-bold text-gray-900">{{ getActivity(time).clientName }}</p>
                  <p v-if="getActivity(time).notes" class="text-xs text-gray-400 mt-1 truncate">{{ getActivity(time).notes }}</p>
                </div>
              </template>
              <template v-else>
                <span class="text-xs text-gray-300 font-bold tracking-wider">+ 新增行程</span>
              </template>
            </div>
          </div>
        </div>
      </div>

      <div v-show="currentTab === 'org'" class="p-5 animate-fade-in pb-12">
        <header class="mb-8 mt-2 flex justify-between items-end">
          <div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">組織發展</h1>
            <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-widest">團隊編制與進度</p>
          </div>
          <button @click="openMemberModal()" class="text-[11px] font-bold bg-gray-900 text-white px-3 py-2 rounded-xl shadow-md active:scale-95 transition-transform">+ 新增成員</button>
        </header>

        <div class="flex flex-col items-center">
          <div class="bg-gradient-to-br from-blue-900 via-slate-800 to-indigo-900 text-white w-full max-w-[16rem] p-5 rounded-[1.5rem] shadow-xl text-center relative z-10 border border-amber-500/30">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20 mix-blend-overlay"></div>
            <p class="text-[10px] text-amber-400/90 font-bold mb-1 tracking-widest">業務主任 (未來區經理)</p>
            <p class="text-xl font-black tracking-widest">鎔安</p>
          </div>
          
          <div class="w-0.5 h-6 bg-gray-300"></div>
          <div v-if="teamMembers.length > 0" class="w-[85%] h-0.5 bg-gray-300 relative">
            <div class="absolute w-0.5 h-4 bg-gray-300 left-0 top-0"></div>
            <div class="absolute w-0.5 h-4 bg-gray-300 right-0 top-0"></div>
          </div>

          <div class="grid grid-cols-2 gap-4 w-full mt-4">
            <div v-for="(member, index) in teamMembers" :key="index" @click="openMemberModal(index)" 
                 class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm relative active:scale-95 transition-transform cursor-pointer overflow-hidden flex flex-col justify-between h-full">
              <div class="absolute top-0 left-0 w-full h-1 rounded-t-2xl" :class="getMemberColor(member.status).topBar"></div>
              <div>
                <p class="text-[9px] font-bold mb-1 line-clamp-1" :class="getMemberColor(member.status).text">{{ member.status }}</p>
                <p class="text-sm font-black text-gray-900">{{ member.name }}</p>
              </div>
              <div v-if="member.notes" class="mt-3 inline-block px-2 py-1.5 rounded-lg text-[10px] font-bold leading-relaxed line-clamp-2" :class="getMemberColor(member.status).bg">
                {{ member.notes }}
              </div>
            </div>
          </div>
          
          <div v-if="teamMembers.length === 0" class="mt-12 text-xs font-bold text-gray-400 text-center bg-white p-6 rounded-3xl border border-dashed border-gray-200">
            目前尚無成員<br><span class="text-[10px] mt-2 block">點擊右上角「+ 新增成員」建立組織架構</span>
          </div>
        </div>
      </div>

      <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-gray-200/50 pb-safe pt-2 px-6 z-40">
        <div class="max-w-md mx-auto flex justify-around items-center h-16">
          <div @click="currentTab = '339'" class="flex flex-col items-center justify-center w-20 h-full cursor-pointer transition-colors" :class="currentTab === '339' ? 'text-blue-600' : 'text-gray-400'">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold">339 戰情</span>
          </div>
          <div @click="currentTab = 'org'" class="flex flex-col items-center justify-center w-20 h-full cursor-pointer transition-colors" :class="currentTab === 'org' ? 'text-blue-600' : 'text-gray-400'">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span class="text-[10px] font-bold">組織發展</span>
          </div>
        </div>
      </nav>

      <div v-if="isActivityModalOpen" class="fixed inset-0 z-50 flex items-end justify-center">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" @click="isActivityModalOpen = false"></div>
        <div class="relative w-full max-w-md bg-white rounded-t-[2rem] p-6 shadow-2xl animate-slide-up pb-10">
          <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
          <div class="flex justify-between items-start mb-6">
            <div>
              <h2 class="text-xl font-black text-gray-900 mb-1">記錄活動</h2>
              <p class="text-xs font-bold text-blue-600">{{ formattedDate }} | {{ selectedTime }}</p>
            </div>
            <button v-if="formData.clientName" @click="deleteActivity" class="text-[10px] font-bold text-red-500 bg-red-50 px-3 py-2 rounded-xl">刪除</button>
          </div>

          <div class="space-y-4">
            <div>
              <label class="block text-[11px] font-bold text-gray-500 mb-2">對象 (自動加密)</label>
              <input v-model="formData.clientName" type="text" placeholder="輸入客戶或準增員..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-500 mb-2">活動類型</label>
              <div class="flex flex-wrap gap-2">
                <button v-for="type in activityTypes" :key="type" @click="formData.type = type" 
                        class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all border" 
                        :class="formData.type === type ? 'bg-gray-900 text-white border-gray-900 shadow-md' : 'bg-white border-gray-200 text-gray-600'">
                  {{ type }}
                </button>
              </div>
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-500 mb-2">備註事項 (自動加密)</label>
              <textarea v-model="formData.notes" rows="2" placeholder="重點記錄..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"></textarea>
            </div>
            <button @click="saveActivity" class="w-full mt-2 bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 active:scale-95 transition-transform">
              加密並儲存
            </button>
          </div>
        </div>
      </div>

      <div v-if="isMemberModalOpen" class="fixed inset-0 z-50 flex items-end justify-center">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" @click="isMemberModalOpen = false"></div>
        <div class="relative w-full max-w-md bg-white rounded-t-[2rem] p-6 shadow-2xl animate-slide-up pb-10">
          <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
          <div class="flex justify-between items-start mb-6">
            <h2 class="text-xl font-black text-gray-900">{{ editingMemberIndex === -1 ? '新增團隊成員' : '編輯成員資料' }}</h2>
            <button v-if="editingMemberIndex !== -1" @click="deleteMember" class="text-[10px] font-bold text-red-500 bg-red-50 px-3 py-2 rounded-xl">移除成員</button>
          </div>

          <div class="space-y-4">
            <div>
              <label class="block text-[11px] font-bold text-gray-500 mb-2">姓名</label>
              <input v-model="memberForm.name" type="text" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-500 mb-2">目前狀態</label>
              <select v-model="memberForm.status" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 appearance-none">
                <option v-for="status in memberStatuses" :key="status" :value="status">{{ status }}</option>
              </select>
            </div>
            <div>
              <label class="block text-[11px] font-bold text-gray-500 mb-2">重要活動/備註提醒</label>
              <textarea v-model="memberForm.notes" rows="2" placeholder="例如：下週二公會考..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500"></textarea>
            </div>
            <button @click="saveMember" class="w-full mt-2 bg-gray-900 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform">
              儲存組織變更
            </button>
          </div>
        </div>
      </div>

    </template>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted, watch } = Vue;

    createApp({
      setup() {
        // --- 資安與解鎖邏輯 ---
        const isUnlocked = ref(false);
        const passcode = ref('');
        const loginError = ref('');
        const ENCRYPTION_KEY = ref('');

        // 初始化檢查是否已設定密碼
        onMounted(() => {
          if (!localStorage.getItem('rongan_vault_check')) {
            // 第一次使用
          }
        });

        const unlockApp = () => {
          if (!passcode.value) { loginError.value = '密碼不能為空'; return; }
          
          const storedCheck = localStorage.getItem('rongan_vault_check');
          if (storedCheck) {
            // 驗證密碼
            try {
              const bytes = CryptoJS.AES.decrypt(storedCheck, passcode.value);
              const decrypted = bytes.toString(CryptoJS.enc.Utf8);
              if (decrypted === 'VALID') {
                ENCRYPTION_KEY.value = passcode.value;
                isUnlocked.value = true;
                loadData();
              } else {
                loginError.value = '密碼錯誤，無法解密資料';
              }
            } catch (e) {
              loginError.value = '密碼錯誤，無法解密資料';
            }
          } else {
            // 首次設定密碼
            const checkStr = CryptoJS.AES.encrypt('VALID', passcode.value).toString();
            localStorage.setItem('rongan_vault_check', checkStr);
            ENCRYPTION_KEY.value = passcode.value;
            isUnlocked.value = true;
            saveData(); // 初始化空資料庫
          }
        };

        // --- 核心資料狀態 ---
        const currentTab = ref('339');
        // 日期邏輯
        const getTodayString = () => {
          const tzOffset = (new Date()).getTimezoneOffset() * 60000;
          return (new Date(Date.now() - tzOffset)).toISOString().split('T')[0];
        };
        const currentDate = ref(getTodayString());
        const isToday = computed(() => currentDate.value === getTodayString());
        
        const formattedDate = computed(() => {
          const d = new Date(currentDate.value);
          return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
        });

        const changeDate = (days) => {
          const d = new Date(currentDate.value);
          d.setDate(d.getDate() + days);
          if (d > new Date(getTodayString())) return; // 不允許看未來
          currentDate.value = d.toISOString().split('T')[0];
        };

        // 資料庫 (加密儲存)
        const allActivities = ref({}); // 格式: { '2026-04-20': [...] }
        const teamMembers = ref([]);

        // 加解密與儲存函數
        const saveData = () => {
          if (!ENCRYPTION_KEY.value) return;
          const dataToSave = { activities: allActivities.value, members: teamMembers.value };
          const encryptedStr = CryptoJS.AES.encrypt(JSON.stringify(dataToSave), ENCRYPTION_KEY.value).toString();
          localStorage.setItem('rongan_vault_data', encryptedStr);
        };

        const loadData = () => {
          const encryptedStr = localStorage.getItem('rongan_vault_data');
          if (encryptedStr) {
            try {
              const bytes = CryptoJS.AES.decrypt(encryptedStr, ENCRYPTION_KEY.value);
              const decrypted = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
              allActivities.value = decrypted.activities || {};
              teamMembers.value = decrypted.members || [];
            } catch (e) {
              console.error("解密失敗");
            }
          }
        };

        // --- 339 戰情室邏輯 ---
        const timeSlots = Array.from({ length: 16 }, (_, i) => `${(i + 8).toString().padStart(2, '0')}:00`);
        
        const currentDayActivities = computed(() => allActivities.value[currentDate.value] || []);
        
        const totalSalesScore = computed(() => currentDayActivities.value.reduce((sum, act) => sum + act.sales, 0));
        const totalRecruitScore = computed(() => currentDayActivities.value.reduce((sum, act) => sum + act.recruit, 0));
        
        const aiSuggestion = computed(() => {
          if (totalSalesScore.value === 0 && totalRecruitScore.value === 0) return '尚未有活動紀錄，立刻展開行動！';
          if (totalSalesScore.value > totalRecruitScore.value * 2) return '銷售動能強勁！建議搭配增員約訪平衡組織發展。';
          if (totalRecruitScore.value > 0) return '增員能量注入中！趁熱打鐵推進準增員進度。';
          return '持續累積活動量，量大是致勝的關鍵！';
        });

        const getActivity = (time) => currentDayActivities.value.find(a => a.time === time);

        const getTypeStyle = (type) => {
          const styles = {
            '約訪': 'bg-blue-400', '面談': 'bg-blue-600', '簽約': 'bg-purple-600',
            '客戶服務': 'bg-gray-400', '增員活動': 'bg-emerald-400',
            '增員約訪': 'bg-emerald-500', '增員面談': 'bg-emerald-600', '其他': 'bg-orange-400'
          };
          return styles[type] || 'bg-gray-400';
        };

        // 339 表單
        const isActivityModalOpen = ref(false);
        const selectedTime = ref('');
        const activityTypes = ['約訪', '面談', '簽約', '客戶服務', '增員活動', '增員約訪', '增員面談', '其他'];
        const formData = reactive({ clientName: '', type: '約訪', notes: '' });

        const openActivityModal = (time) => {
          selectedTime.value = time;
          const existing = getActivity(time);
          if (existing) {
            formData.clientName = existing.clientName; formData.type = existing.type; formData.notes = existing.notes;
          } else {
            formData.clientName = ''; formData.type = '約訪'; formData.notes = '';
          }
          isActivityModalOpen.value = true;
        };

        const saveActivity = () => {
          if (!formData.clientName) { alert('請填寫姓名'); return; }
          let sScore = 0; let rScore = 0;
          if (formData.type === '約訪') sScore = 1; if (formData.type === '面談') sScore = 2; if (formData.type === '簽約') sScore = 3;
          if (formData.type === '增員活動') rScore = 1; if (formData.type === '增員約訪') rScore = 2; if (formData.type === '增員面談') rScore = 5;

          if (!allActivities.value[currentDate.value]) allActivities.value[currentDate.value] = [];
          
          allActivities.value[currentDate.value] = allActivities.value[currentDate.value].filter(a => a.time !== selectedTime.value);
          allActivities.value[currentDate.value].push({ time: selectedTime.value, type: formData.type, clientName: formData.clientName, notes: formData.notes, sales: sScore, recruit: rScore });
          
          saveData(); // 觸發加密儲存
          isActivityModalOpen.value = false;
        };

        const deleteActivity = () => {
          if (!allActivities.value[currentDate.value]) return;
          allActivities.value[currentDate.value] = allActivities.value[currentDate.value].filter(a => a.time !== selectedTime.value);
          saveData();
          isActivityModalOpen.value = false;
        };

        // --- 組織圖邏輯 ---
        const memberStatuses = ['臨時帳號申請中', '準備公會考試', '等待登錄中', '業務代表', '業務主任', '業務襄理'];
        const getMemberColor = (status) => {
          if (status.includes('考試') || status.includes('臨時')) return { topBar: 'bg-gray-400', text: 'text-gray-500', bg: 'bg-gray-100 text-gray-600' };
          if (status.includes('登錄')) return { topBar: 'bg-amber-400', text: 'text-amber-500', bg: 'bg-amber-50 text-amber-600' };
          if (status.includes('代表')) return { topBar: 'bg-blue-500', text: 'text-blue-500', bg: 'bg-blue-50 text-blue-600' };
          return { topBar: 'bg-indigo-500', text: 'text-indigo-500', bg: 'bg-indigo-50 text-indigo-600' };
        };

        const isMemberModalOpen = ref(false);
        const editingMemberIndex = ref(-1);
        const memberForm = reactive({ name: '', status: '準備公會考試', notes: '' });

        const openMemberModal = (index = -1) => {
          editingMemberIndex.value = index;
          if (index !== -1) {
            const m = teamMembers.value[index];
            memberForm.name = m.name; memberForm.status = m.status; memberForm.notes = m.notes;
          } else {
            memberForm.name = ''; memberForm.status = '準備公會考試'; memberForm.notes = '';
          }
          isMemberModalOpen.value = true;
        };

        const saveMember = () => {
          if (!memberForm.name) { alert('請填寫姓名'); return; }
          const newMember = { name: memberForm.name, status: memberForm.status, notes: memberForm.notes };
          
          if (editingMemberIndex.value === -1) {
            teamMembers.value.push(newMember);
          } else {
            teamMembers.value[editingMemberIndex.value] = newMember;
          }
          saveData();
          isMemberModalOpen.value = false;
        };

        const deleteMember = () => {
          if (confirm('確定要移除此成員嗎？')) {
            teamMembers.value.splice(editingMemberIndex.value, 1);
            saveData();
            isMemberModalOpen.value = false;
          }
        };

        return { 
          isUnlocked, passcode, loginError, unlockApp,
          currentTab, currentDate, formattedDate, isToday, changeDate,
          timeSlots, totalSalesScore, totalRecruitScore, aiSuggestion, getActivity, getTypeStyle, 
          isActivityModalOpen, selectedTime, activityTypes, formData, openActivityModal, saveActivity, deleteActivity,
          teamMembers, memberStatuses, getMemberColor, isMemberModalOpen, editingMemberIndex, memberForm, openMemberModal, saveMember, deleteMember
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
